services:
  bot:
    build:
      context: .
      args:
        BUN_IMAGE: oven/bun:1.3.11-debian
    env_file:
      - .env
    environment:
      API_PORT: ${API_PORT:-3000}
      DATABASE_URL: file:/data/app.db
      NODE_ENV: production
    ports:
      - "${API_PORT:-3000}:${API_PORT:-3000}"
    restart: unless-stopped
    volumes:
      - bot-data:/data

volumes:
  bot-data:
